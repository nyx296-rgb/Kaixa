version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: mailexplorer_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailexplorer_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      # Mount the user's Documentos directory so local paths can be opened directly
      - /home/mv/Documentos:/mnt/documentos
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SQLITE_DB_PATH=/app/mailexplorer.db
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailexplorer_worker
    command: arq workers.parse_worker.WorkerSettings
    volumes:
      - ./backend:/app
      - /home/mv/Documentos:/mnt/documentos
    environment:
      - REDIS_URL=redis://redis:6379
      - SQLITE_DB_PATH=/app/mailexplorer.db
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: mailexplorer_frontend
    command: sh -c "npm install && npm run dev -- --host"
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

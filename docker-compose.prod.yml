services:
  redis:
    image: redis:7-alpine
    container_name: mailexplorer_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailexplorer_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/db
    environment:
      - REDIS_URL=redis://redis:6379
      - SQLITE_DB_PATH=/app/db/mailexplorer.db
      - UPLOAD_DIR=/app/uploads
      - JWT_SECRET=${JWT_SECRET}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://yourdomain.com}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailexplorer_worker
    command: arq workers.parse_worker.WorkerSettings
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/db
    environment:
      - REDIS_URL=redis://redis:6379
      - SQLITE_DB_PATH=/app/db/mailexplorer.db
      - UPLOAD_DIR=/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mailexplorer_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  uploads_data:
  db_data:
